services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      # Uncomment these when deploying on GMI (injected by AgentBox)
      # - GMI_MAAS_BASE_URL=https://api.gmi-serving.com
      # - GMI_MAAS_API_KEY=your-key
      # - GMI_MODELS=deepseek-ai/DeepSeek-V4-Pro
