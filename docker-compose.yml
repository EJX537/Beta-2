services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-8080}
      - INTERVIEW_DB=${INTERVIEW_DB:-/data/interview.db}
      - AGENT_DB=${AGENT_DB:-/data/agent1.db}
    volumes:
      - ./data:/data
