# Two-agent stack. Both services share the ./data directory so the interview
# agent can read the resume agent's agent1.db (read-only) to hydrate candidate
# context by profile_id — that shared DB is the integration seam.
#
#   resume-agent     — resume upload + ranking (agent1.py, Anthropic SDK)
#                      writes  /data/agent1.db          -> http://localhost:8081
#   interview-agent  — FSM-driven interviewing (pi SDK, GMI MaaS)
#                      reads   /data/agent1.db (RO)
#                      writes  /data/interview.db        -> http://localhost:8080
#
# Bring it up:  docker compose up --build
# Secrets come from .env:
#   ANTHROPIC_API_KEY   (resume agent)
#   GMI_MAAS_API_KEY / GMI_MAAS_BASE_URL / GMI_MODELS / GMI_GRADING_MODEL  (interview agent)

services:
  resume-agent:
    build:
      context: .
      dockerfile: Dockerfile.resume
    ports:
      - "8081:8080"          # host 8081 -> container 8080
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}
      - AGENT_PORT=8080
      - AGENT_DB=/data/agent1.db
      # Optional tuning (defaults shown in agent1.py):
      # - AGENT_MODEL=claude-sonnet-4-6
      # - AGENT_MAX_RESUME_CHARS=60000
    volumes:
      - ./data:/data
    restart: unless-stopped

  interview-agent:
    build:
      context: .
      dockerfile: Dockerfile          # PR's Node/pi multi-stage build
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8080
      - INTERVIEW_DB=${INTERVIEW_DB:-/data/interview.db}
      - AGENT_DB=${AGENT_DB:-/data/agent1.db}
      - INTERVIEW_ARTIFACT_ROOT=${INTERVIEW_ARTIFACT_ROOT:-/data/interview-artifacts}
    volumes:
      - ./data:/data
    depends_on:
      - resume-agent                  # ensure agent1.db exists before attach
    restart: unless-stopped
