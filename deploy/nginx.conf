# Reverse proxy for the combined two-agent container.
#   /interview/*  -> interview agent (Node, 127.0.0.1:8002)
#   everything else -> resume agent  (Python, 127.0.0.1:8001)
# GMI Cloud routes the public web endpoint to port 8080 here.
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    access_log /dev/stdout;

    # Keep all writable paths under /tmp.
    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    client_max_body_size 25m;          # resume PDFs + interview audio uploads

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;           # agent turns can be slow
    proxy_send_timeout 300s;

    server {
        listen 8080;

        location /interview/ {
            proxy_pass http://127.0.0.1:8002;
            proxy_buffering off;        # SSE / streaming friendly
        }

        location / {
            proxy_pass http://127.0.0.1:8001;
        }
    }
}
